name: Build and publish to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          npm install --no-audit --no-fund --no-package-lock

      - name: Build
        run: npm run build

      - name: Prepare static files
        run: |
          rm -rf /tmp/chronicles-pages
          mkdir -p /tmp/chronicles-pages
          cp -R dist/. /tmp/chronicles-pages/
          touch /tmp/chronicles-pages/.nojekyll

      - name: Publish to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true
          git switch --orphan gh-pages

          git rm -rf . || true
          cp -R /tmp/chronicles-pages/. .

          git add .
          git commit -m "Deploy GitHub Pages" || echo "No changes to deploy"
          git push --force origin gh-pages
